<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ارسم معاً - تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  background: linear-gradient(135deg,#1a0533 0%,#2d1b69 40%,#11998e 100%);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  position:relative;overflow:hidden;
}
.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.bubble{position:absolute;border-radius:50%;opacity:0.15;animation:float 8s infinite ease-in-out;}
.bubble:nth-child(1){width:80px;height:80px;background:#ff6b6b;top:10%;left:5%;animation-delay:0s;}
.bubble:nth-child(2){width:120px;height:120px;background:#ffd93d;top:60%;left:80%;animation-delay:2s;}
.bubble:nth-child(3){width:60px;height:60px;background:#6bcb77;top:80%;left:20%;animation-delay:4s;}
.bubble:nth-child(4){width:100px;height:100px;background:#4d96ff;top:30%;left:70%;animation-delay:1s;}
.bubble:nth-child(5){width:50px;height:50px;background:#ff6b9d;top:50%;left:40%;animation-delay:3s;}
@keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);}}

.card{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:28px;
  padding:36px 28px;
  width:100%;max-width:420px;
  position:relative;z-index:1;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
}
.logo{text-align:center;margin-bottom:24px;}
.logo-icon{font-size:52px;display:block;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.logo h1{color:#fff;font-size:28px;font-weight:900;margin-top:8px;}
.logo p{color:rgba(255,255,255,0.6);font-size:14px;margin-top:4px;}

.error{
  background:rgba(255,100,100,0.2);
  border:1px solid rgba(255,100,100,0.4);
  color:#ffaaaa;
  padding:10px 16px;
  border-radius:12px;
  margin-bottom:16px;
  font-size:14px;text-align:center;
}

label{color:rgba(255,255,255,0.8);font-size:13px;display:block;margin-bottom:6px;}
input[type=text]{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:14px;color:#fff;font-size:16px;
  font-family:'Tajawal',sans-serif;
  outline:none;transition:.3s;margin-bottom:20px;
}
input[type=text]:focus{border-color:#6bcb77;background:rgba(255,255,255,0.15);}
input[type=text]::placeholder{color:rgba(255,255,255,0.4);}

.section-title{color:rgba(255,255,255,0.8);font-size:13px;margin-bottom:10px;}

.avatar-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
  margin-bottom:20px;
}
.av-btn{
  font-size:26px;padding:10px;
  background:rgba(255,255,255,0.08);
  border:2px solid transparent;
  border-radius:12px;cursor:pointer;
  transition:.2s;text-align:center;
}
.av-btn:hover{background:rgba(255,255,255,0.18);}
.av-btn.selected{border-color:#ffd93d;background:rgba(255,217,61,0.2);}

.color-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.color-row label{margin:0;}
input[type=color]{
  width:48px;height:48px;border:none;
  border-radius:12px;cursor:pointer;padding:3px;
  background:rgba(255,255,255,0.1);
}
.preset-colors{display:flex;gap:8px;flex-wrap:wrap;}
.preset{
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:.2s;
}
.preset.selected{border-color:#fff;transform:scale(1.15);}

.btn-login{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#11998e,#38ef7d);
  border:none;border-radius:16px;
  color:#fff;font-size:18px;font-weight:700;
  font-family:'Tajawal',sans-serif;
  cursor:pointer;letter-spacing:1px;
  transition:.3s;box-shadow:0 8px 25px rgba(17,153,142,0.4);
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(17,153,142,0.5);}
.btn-login:active{transform:scale(0.97);}
</style>
</head>
<body>
<div class="bubbles">
  <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  <div class="bubble"></div><div class="bubble"></div>
</div>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🎨</span>
    <h1>ارسم معاً</h1>
    <p>العب وارسم مع أصدقائك</p>
  </div>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="POST">
    <label>اسم المستخدم</label>
    <input type="text" name="username" placeholder="أدخل اسمك..." maxlength="20" required autocomplete="off">

    <p class="section-title">اختر أفاتارك</p>
    <div class="avatar-grid" id="avatarGrid">
      {% for av in avatars %}
      <div class="av-btn {% if loop.first %}selected{% endif %}" data-av="{{ av }}" onclick="selectAv(this)">{{ av }}</div>
      {% endfor %}
    </div>
    <input type="hidden" name="avatar" id="avatarInput" value="{{ avatars[0] }}">

    <p class="section-title">لون الريشة</p>
    <div class="color-row">
      <input type="color" id="colorPick" value="#FF6B6B" oninput="setColor(this.value)">
      <div class="preset-colors">
        <div class="preset selected" style="background:#FF6B6B" onclick="setColor('#FF6B6B',this)"></div>
        <div class="preset" style="background:#FFD93D" onclick="setColor('#FFD93D',this)"></div>
        <div class="preset" style="background:#6BCB77" onclick="setColor('#6BCB77',this)"></div>
        <div class="preset" style="background:#4D96FF" onclick="setColor('#4D96FF',this)"></div>
        <div class="preset" style="background:#FF6B9D" onclick="setColor('#FF6B9D',this)"></div>
        <div class="preset" style="background:#C77DFF" onclick="setColor('#C77DFF',this)"></div>
        <div class="preset" style="background:#FF9A3C" onclick="setColor('#FF9A3C',this)"></div>
      </div>
    </div>
    <input type="hidden" name="color" id="colorInput" value="#FF6B6B">

    <button type="submit" class="btn-login">✏️ ابدأ الرسم</button>
  </form>
</div>

<script>
function selectAv(el){
  document.querySelectorAll('.av-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('avatarInput').value = el.dataset.av;
}
function setColor(val, el){
  document.getElementById('colorInput').value = val;
  document.getElementById('colorPick').value = val;
  document.querySelectorAll('.preset').forEach(p=>p.classList.remove('selected'));
  if(el) el.classList.add('selected');
}
</script>
</body>
</html>
